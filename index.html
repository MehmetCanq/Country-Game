<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Giriş</title>
</head>
<body>
    <div class="wrapper">
        
        <input type="checkbox" id="flip-toggle" class="toggle-checkbox">
        
        <div class="toggle-controls">
            <span class="toggle-text">Giriş Yap</span>
            <label for="flip-toggle" class="toggle-switch"></label>
            <span class="toggle-text">Kayıt Ol</span>
        </div>

        <div class="flip-card">
            <div class="flip-card__inner">
                
                <div class="flip-card__front card-face">
                    <h2>Hoş Geldiniz</h2>
                    <p class="subtitle">Maceraya başlamak için giriş yapın</p>
                    <form id="login-form">
                        <input type="text" id="login-username" class="theme-input" placeholder="Kullanıcı Adı" autocomplete="off" required>
                        <input type="password" id="login-password" class="theme-input" placeholder="Şifre" required>
                        <button type="button" id="login-btn" class="theme-btn">Giriş Yap</button>
                    </form>
                </div>
                
                <div class="flip-card__back card-face">
                    <h2>Kayıt Ol</h2>
                    <p class="subtitle">Aramıza katılın</p>
                    <form id="register-form">
                        <input type="text" id="reg-username" class="theme-input" placeholder="Kullanıcı Adı" autocomplete="off" required>
                        <input type="email" id="reg-email" class="theme-input" placeholder="E-Posta" autocomplete="email" required>
                        <input type="password" id="reg-password" class="theme-input" placeholder="Şifre" required>
                        <button type="button" id="reg-btn" class="theme-btn">Kayıt Ol</button>
                    </form>
                </div>
                
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
